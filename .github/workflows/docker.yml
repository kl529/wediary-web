name: CI / Build / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to home server after build'
        default: 'true'
        type: boolean

# Cancel in-progress runs for the same ref (e.g. rapid pushes to main)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Lint · Typecheck · Test
  # Runs on every push and pull_request
  # ──────────────────────────────────────────────────────────
  ci:
    name: CI (lint / typecheck / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  # ──────────────────────────────────────────────────────────
  # Job 2: Build Docker image and push to GHCR
  # Runs only on main branch push or workflow_dispatch
  # ──────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker image
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache speeds up repeated builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_CLARITY_PROJECT_ID=${{ secrets.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Job 3: Deploy to home server via SSH
  # Runs after a successful build.
  # For workflow_dispatch, skipped when deploy input is false.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to home server
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy == 'true'
    environment: production

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_ACTOR: ${{ github.actor }}
          DEPLOY_TAG: sha-${{ github.sha }}
          DEPLOY_REPO: ${{ github.repository }}
          DEPLOY_DIR: ${{ secrets.HOME_SERVER_APP_DIR }}
        with:
          host: ${{ secrets.HOME_SERVER_HOST }}
          username: ${{ secrets.HOME_SERVER_USER }}
          key: ${{ secrets.HOME_SERVER_SSH_KEY }}
          port: ${{ secrets.HOME_SERVER_PORT }}
          envs: DEPLOY_TOKEN,DEPLOY_ACTOR,DEPLOY_TAG,DEPLOY_REPO,DEPLOY_DIR
          script: |
            set -euo pipefail
            cd "${DEPLOY_DIR:-$HOME/make-me-growth}"

            # Authenticate to GHCR using the workflow-scoped token
            echo "$DEPLOY_TOKEN" | docker login ghcr.io -u "$DEPLOY_ACTOR" --password-stdin

            # Pull the newly built image
            IMAGE_TAG="$DEPLOY_TAG" GITHUB_REPOSITORY="$DEPLOY_REPO" \
              docker compose pull

            # Zero-downtime container restart
            IMAGE_TAG="$DEPLOY_TAG" GITHUB_REPOSITORY="$DEPLOY_REPO" \
              docker compose up -d --remove-orphans

            # Prune dangling images to reclaim disk space
            docker image prune -f

            # Wait for the app to pass its health check (up to 60 s)
            echo "Waiting for /api/health..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "Healthy after ${i} attempt(s)"
                exit 0
              fi
              echo "Attempt ${i}/12 — retrying in 5 s..."
              sleep 5
            done
            echo "ERROR: app did not become healthy within 60 s" >&2
            exit 1
